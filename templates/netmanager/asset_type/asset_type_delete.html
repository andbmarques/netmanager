{% extends "base.html" %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
</head>
<body>
    {% block content %}
        <div class="flex flex-col w-full p-4 gap-4">
            <h2 class="title-page">Delete Type {{ asset_type.name }}?</h2>
            <p>Are you sure you want to delete the type <strong>{{ asset_type.name }}?</strong></p>
            {% if error_message %}
                <p class="errorlist">{{ error_message }}</p>
            {% endif %}
            <form method="post">
                {% csrf_token %}
                <div class="flex gap-4 items-center">
                    <button type="submit" class="btn-primary bg-red-700 px-8">
                        <i data-lucide="trash" class="size-4"></i>
                        Yes
                    </button>
                    <a href="/asset_type/">No</a>
                </div>
            </form>
        </div>
    {% endblock %}
</body>
</html>
