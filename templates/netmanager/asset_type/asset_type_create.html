{% extends "base.html" %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Asset Type</title>
</head>
<body>
{% block content %}
    <div class="flex flex-col w-full p-4 gap-4">
        <h2 class="title-page">New Asset Type</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="flex gap-4 items-center">
                <button type="submit" class="btn-primary">
                    <i data-lucide="save"></i>
                    Save
                </button>
                <a href="/asset_type/">Cancel</a>
            </div>
        </form>
    </div>
{% endblock %}
</body>
</html>
